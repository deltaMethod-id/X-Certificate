<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download Certificate • X-Certificate</title>

  <link rel="icon" type="image/png" href="xc.png">
  <link rel="stylesheet" href="download.css">
</head>
<body>

  <header>
    <a href="preview.html" class="back-btn">← Back to Preview</a>

    <img src="xc.png" alt="X-Certificate Logo" class="logo">

    <h1>Download Certificate</h1>

    <p>Your certificate is ready to download.</p>
  </header>

  <main>

    <section class="download-card">

      <img src="xc.png" alt="Certificate Logo" class="certificate-logo">

      <h2 id="downloadTitle">Certificate of Achievement</h2>

      <p>
        Your custom certificate has been generated successfully.
      </p>

      <div class="certificate-info">
        <p><strong>Recipient:</strong> <span id="downloadName">Recipient Name</span></p>
        <p><strong>Certificate ID:</strong> <span id="downloadId">XC-2026-000001</span></p>
        <p><strong>Issue Date:</strong> <span id="downloadDate">YYYY-MM-DD</span></p>
      </div>

      <div class="download-buttons">
        <button id="downloadPng">Download PNG</button>
        <button id="downloadPdf">Download PDF</button>
      </div>

      <br>

      <a href="index.html" class="home-btn">
        Back to Home
      </a>

    </section>

  </main>

  <script src="download.js"></script>

</body>
</html>
